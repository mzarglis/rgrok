name: Tag Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  actions: write

jobs:
  tag:
    name: Bump version and tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Bump version and push tag
        id: tag_version
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: false
          release_branches: main
          tag_prefix: v
          custom_release_rules: feat:minor:Features,fix:patch:Bug Fixes,perf:patch:Performance,refactor:patch:Refactoring

      - name: Trigger release workflow
        if: steps.tag_version.outputs.new_tag != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Created tag ${{ steps.tag_version.outputs.new_tag }}"
          gh workflow run release.yml --ref ${{ steps.tag_version.outputs.new_tag }}
