name: Tag Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  tag:
    name: Bump version and tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump version and push tag
        id: tag_version
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch
          release_branches: main
          tag_prefix: v
          custom_release_rules: |
            feat:minor:Features,fix:patch:Bug Fixes,perf:patch:Performance,refactor:patch:Refactoring,docs:patch:Documentation,chore:false:Chores,ci:false:CI,test:false:Tests,build:false:Build

      - name: Log new tag
        if: steps.tag_version.outputs.new_tag != ''
        run: |
          echo "Created tag ${{ steps.tag_version.outputs.new_tag }}"
          echo "Previous tag: ${{ steps.tag_version.outputs.previous_tag }}"
          echo "Release type: ${{ steps.tag_version.outputs.release_type }}"
