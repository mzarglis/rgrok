name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            binary_suffix: ""
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            binary_suffix: ""
          - target: x86_64-apple-darwin
            os: macos-latest
            binary_suffix: ""
          - target: aarch64-apple-darwin
            os: macos-latest
            binary_suffix: ""
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            binary_suffix: ".exe"

    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo 'CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc' >> $GITHUB_ENV

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Compress with UPX
        if: matrix.target != 'x86_64-apple-darwin' && matrix.target != 'aarch64-apple-darwin'
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            choco install upx -y
          else
            sudo apt-get install -y upx
          fi
          upx --best --lzma target/${{ matrix.target }}/release/rgrok${{ matrix.binary_suffix }} || true
          upx --best --lzma target/${{ matrix.target }}/release/rgrok-server${{ matrix.binary_suffix }} || true

      - name: Package
        shell: bash
        run: |
          mkdir -p staging
          cp target/${{ matrix.target }}/release/rgrok${{ matrix.binary_suffix }} staging/
          cp target/${{ matrix.target }}/release/rgrok-server${{ matrix.binary_suffix }} staging/
          cd staging
          tar czf ../rgrok-${{ matrix.target }}.tar.gz *

      - uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.target }}
          path: rgrok-${{ matrix.target }}.tar.gz

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
