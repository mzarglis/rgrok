name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            binary_suffix: ""
          - target: x86_64-apple-darwin
            os: macos-latest
            binary_suffix: ""
          - target: aarch64-apple-darwin
            os: macos-latest
            binary_suffix: ""
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            binary_suffix: ".exe"

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/rgrok${{ matrix.binary_suffix }} dist/rgrok-${{ matrix.target }}${{ matrix.binary_suffix }}
          cp target/${{ matrix.target }}/release/rgrok-server${{ matrix.binary_suffix }} dist/rgrok-server-${{ matrix.target }}${{ matrix.binary_suffix }}

      - uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.target }}
          path: dist/

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
